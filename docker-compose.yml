services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "32MB"

  api1:
    image: ${API_IMAGE:-ghcr.io/ddiidev/rinha2026-v:latest}
    container_name: rinha-api1
    environment:
      PORT: "8080"
      RINHA_REFERENCES_BIN: /app/data/references.bin
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159MB"

  api2:
    image: ${API_IMAGE:-ghcr.io/ddiidev/rinha2026-v:latest}
    container_name: rinha-api2
    environment:
      PORT: "8080"
      RINHA_REFERENCES_BIN: /app/data/references.bin
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159MB"

networks:
  default:
    driver: bridge

